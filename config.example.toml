# 复制本文件为 config.toml 并填入你的中转站信息。改完保存后重启程序生效。
#
# 热键:按住【主键】说话=识别整理;主键+翻译键=中英互译(中→英,其他→中);主键+命令键=对选中文字执行语音命令。

[hotkey]
primary            = "LWin"   # 可用:LWin RWin LAlt RAlt LCtrl RCtrl LShift RShift
translate_modifier = "LAlt"
command_modifier   = "LCtrl"

[asr]
model_dir = "./models/sensevoice"
language  = "auto"        # auto / zh / en ...

[llm]
enabled  = true           # false 则直接输出原始识别文本,不调用 LLM
base_url = "https://www.packyapi.com/v1"
api_key  = "sk-在这里填你的key"
model    = "deepseek-v4-flash"
mode = "polish"           # clean / polish / summary
temperature = 0.0
timeout_secs = 10
skip_if_shorter_than = 4
vocabulary = []           # 专有名词,如 ["Kubernetes", "OneDrive"];优先按此拼写
# system_prompt = ""       # 非空则覆盖 mode 预设
# translate_prompt = ""    # 翻译模式提示词;留空用内置默认
# command_prompt = ""      # 命令模式提示词;留空用内置默认

[inject]
mode = "paste"            # 目前仅支持 paste

# 随应用风格(可多条);按前台进程名包含匹配,取第一条命中
# [[app_style]]
# match = "outlook"
# style = "用正式、专业的书面语。"
# [[app_style]]
# match = "code"
# style = "保留代码与技术术语原文。"

[overlay]
# 是否显示录音浮窗(底部正中的波形药丸)。false 则不弹。
enabled = true

[sound]
# 录音开始/结束提示音。enabled = false 关闭。
# start_sound / end_sound 留空用内置默认;填 wav 路径(相对 config 目录或绝对)可覆盖。
enabled = true
start_sound = ""
end_sound = ""

[model]
# 语音识别模型下载源(首启向导用;留空走内置默认 hf-mirror 镜像)。下载的 int8 模型存为 model.onnx。
model_url  = "https://hf-mirror.com/csukuangfj/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/resolve/main/model.int8.onnx"
tokens_url = "https://hf-mirror.com/csukuangfj/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/resolve/main/tokens.txt"

[meeting]
# 会议录音(MP3)与纪要(MD)的存放根目录。留空 = 系统「文档/ByType/会议」(好找;
# 注意若文档在 OneDrive 下会被同步上云)。填路径(相对 config 目录或绝对)可改到别处,
# 例如想留本地不上云可设为 "C:/Users/你/ByType/会议"。
output_dir = ""
default_mode = "mic_system"   # mic_system / system / mic(开始会议时仍可在托盘临时选择)
diarization = true            # 区分对方多位说话人(声纹;仅录到系统声音时生效)
clean_transcript = true       # 用 LLM 清理口语词与错别字
audio_retention = "mixed"     # mixed=只留合并 MP3 / tracks=另留双轨 WAV / none=不留音频
archive_bitrate = 48          # 存档 MP3 码率(kbps)
